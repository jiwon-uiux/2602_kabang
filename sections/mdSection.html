    <div class="main-banner con-min-width border-red">
        <div class="bg"></div>
        <div class="con relative border-red">
          <div class="text_box">
            <h3>이미 모두의 은행<br>지금은 카카오뱅크</h3>
  
            <p>
              한 사람, 한 사람을 위해 시작한 은행이

              더 많은 사람들이 찾는 모두의 은행이 되었습니다.

            <ul class="btns flex">

    <style>
        /* 노말라이즈 */
        body, ul, li {
          margin:0;
          padding:0;
          list-style:none;
        }
        
        a {
          color:inherit;
          text-decoration:none;
        }
        
        /* 라이브러리 */
        .border-red {
          border:4px solid red;
        }
        
        .border-pink {
          border:4px solid pink;
        }
        
        .border-blue {
          border:4px solid blue;
        }
        
        .border-green {
          border:4px solid green;
        }
        
        .border-black {
          border:4px solid black;
        }
        
        .border-gold {
          border:4px solid gold;
        }
        
        .flex {
          display:flex;
        }
        
        .flex-jc-e {
          justify-content:flex-end;
        }
        
        .flex-jc-s {
          justify-content:flex-start;
        }
        
        .flex-jc-c {
          justify-content:center;
        }
        
        .flex-jc-sb {
          justify-content:space-between;
        }
        
        .flex-ai-c {
          align-items:center;
        }

        .flex-as-c {
          align-self: center;
        }
        
        .flex-grow-1 {
            flex-grow: 1;
        }
        
        .height-100p {
          height:100%;
        }
        
        .block {
          display:block;
        }
        
        .con {
          margin-left:auto;
          margin-right:auto;
        }
        
        .img-box > img {
            width: 100%;
            display: block;
        }
        
        .relative {
            position: relative;
        }
        
        /* 커스텀 */
        .con {
            width: 1080px;
        }
        
        .con-min-width {
            min-width: 1080px;
        }
        
        ::selection {
            background-color: #FFE100;
        }

        /* ----- 헤더 시작 ----- */
        header {
          width: 100%;
          height: 80px;
          font-size: 15px;
          background-color: #fff;
          position: fixed;
          top: 0;
          left: 0;
          border-bottom: 1px solid rgba(0, 0, 0, .1);
        }
        /* 로고 */
        header .logo_box > a {
          width: 116px;
        }

        /* 메뉴 박스 - 1차 메뉴 */
        header .menu_box > ul > li > a {
          margin: 0 12px;
          padding: 0 12px;
          position: relative;
        }

        header .menu_box ul > li > a:hover {
          text-decoration: underline;
        }

        header .menu_box > ul > li > a:after {
          content: "";
          position: absolute;
          left: 0;
          bottom: 0;
          width: 100%;
          height: 2px;
          background-color: #000;
          display: none;
        }

        /* 메뉴 박스 - 2차 메뉴 */
        header .menu_box > ul > li > div {
          width: 100%;
          background-color: #fff;
          position: absolute;
          top: 100%;
          left: 0;
          display: none;
          padding: 60px 0 36px;
          box-shadow: 0 4px 12px 0 rgba(0, 0, 0, 0.12);
        }

        header .menu_box > ul > li:hover > div {
          display: block;
        }

        header .menu_box .menu_box-sec_menu > ul > li {
          width: calc(100% / 6);
        }

        header .menu_box > ul > li:first-child .menu_box-sec_menu > ul > li {
          width: calc(100% / 4);
        }

        header .menu_box > ul > li:last-child .menu_box-sec_menu > ul > li {
          width: calc(100% / 5);
        }

        header .menu_box .menu_box-sec_menu > ul > li > a {
          margin-bottom: 20px;
          font-size: 17px;
          text-align: center;
        }

        header .menu_box .menu_box-sec_menu ul li a[target="_blank"]::after {
          content: "";
          width: 14px;
          height: 14px;
          display: inline-block;
          background: url(../imgs/imgi_19_icon_eng.svg);
          background-size: 12px 12px;
          margin-left: 8px;
          margin-top: -3px;
          vertical-align: middle;
        }

        header .menu_box .menu_box-sec_menu > ul > li > a[target="_blank"]::after {
          width: 18px;
          height: 18px;
          background-size: 18px 18px;
          margin-top: -5px;
        }

        header .menu_box .menu_box-sec_menu ul ul > li > a {
          margin-bottom: 24px;
          font-size: 13px;
          text-align: center;
          color: #444;
        }

        /* dropdown menu */
        header .drop_down {
          position: relative;
        }
        header .drop_down .drop_btn {
          background: rgba(244, 244, 244, .8);
          color: rgb(68, 68, 68);
          border: 1px solid rgba(229, 229, 229, .8);
          margin: 0 28px 0 14px;
          padding: 0 14px 0 18px;
          height: 40px;
          border-radius: 40px;
          font-size: 15px;
          cursor: pointer;
        }

        /* 이미지 버전 */
        header .drop_down .drop_btn .ico {
          display: inline-block;
          margin-left: 10px;
        }

        header .drop_down .drop_down_content {
          position: absolute;
          top: 100%;
          left: 50%;
          transform: translate(-50%);
          width: 240px;
          margin-top: 29px;
          line-height: 48px;
          border-radius: 6px;
          background-color: #fff;
          box-shadow: 0 4px 12px 0 rgba(0, 0, 0, 0.12);
          visibility: hidden;
          opacity: 0;
        }

        header .drop_down .drop_down_content.is-active {
          visibility: visible;
          opacity: 1;
        }

        header .drop_down .drop_down_content a {
          font-size: 13px;
          display: block;
          padding: 0 24px;
          box-sizing: border-box;
        }

        header .drop_down .drop_down_content a:hover {
          background-color: #f7f7f7;
          text-decoration: underline;
        }

        /* 글로벌 로고 */
        header .global_logo > img {
            display: block;
            width: 100%;
        }

        header .global_logo:hover > img {
            opacity: .4;
        }
        /* 헤더 끝 배너 시작 */

        /* 메인 배너 시작 */
        .img-box img {
            width: 100%;
            display: block;
        }

        .main_banner > .banner_img {
            width: 1200px;
        }

        .main_banner > .bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 648px;
            z-index: -1;
            background-color: #ffef6b;
        }

        /* 중간 섹션 시작 */
        /* 공통 섹션 시작 */
        .md_sec {
            min-height: 500px;
            border: 10px solid black;
            display: flex;
        }

        .md_sec > div:first-child {
            width: 55%;
            display: flex;
            align-items: center;
        }

        .md_sec > div:last-child {
            flex-grow: 1;
            display: flex;
            align-items: center;
        }

        .md_divider {
            height: 32px;
            /* background-color: #fafafa; */
            background-color: #818181;
        }
        /* 공통 섹션 끝 */

        /* 섹션 1 시작 */
        .md_sec .img-box {
            width: 473px;
        }

        .md_sec .txt_box > h3 {
            font-size: 40px;
            line-height: 1.25;
            margin: 0;
        }

        .md_sec .txt_box > p {
            margin-top: 24px;
            font-size: 15px;
            line-height: 1.65;
            color: #666;
        }

        .md_sec .txt_box > .btn_box {
            margin-top: 30px;
        }

        .md_sec .txt_box > .btn_box > a {
            width: 258px;
            height: 56px;
            font-size: 16px;
            line-height: 56px;
            color: #333;
            background-color: #f6f6f6;
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .md_sec .txt_box > .btn_box > a > img {
            width: 6px;
            height: 9px;
            margin: 2px 0 0 8px;
        }
        /* 섹션 1 끝 */
        /* 중간 섹션 끝 */
    </style>
</body>
